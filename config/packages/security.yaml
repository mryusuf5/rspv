security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: name

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        login:
            pattern: ^/api/login$
            security: false

        api_docs:
            pattern: ^/api(/docs(\.(json|jsonld|html))?)?$
            security: false

        avatar:
            pattern: ^/api/users/\d+/avatar$
            security: false

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    access_control:
        - { path: ^/api/login$,           roles: PUBLIC_ACCESS }
        - { path: ^/api/register$,        roles: PUBLIC_ACCESS }
        - { path: ^/api/docs,             roles: PUBLIC_ACCESS }
        - { path: ^/api/users/\d+/avatar, roles: PUBLIC_ACCESS }
        - { path: ^/api,                  roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
